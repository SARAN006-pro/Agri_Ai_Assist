services:
  - type: web
    name: smartfarm-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    port: 8000
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MODEL_NAME
        value: mistralai/mistral-7b-instruct
      - key: FRONTEND_URL
        value: https://agriintel-ai.netlify.app
